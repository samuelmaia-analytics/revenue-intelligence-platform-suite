version: 2

models:
  - name: int_orders_enriched
    description: Orders enriched with customer attributes and business-ready date fields.
    columns:
      - name: order_id
        description: Unique order identifier from staging.
        tests:
          - not_null
          - unique
      - name: customer_id
        description: Customer foreign key.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_month
        description: Month bucket used for revenue trend analysis.
        tests:
          - not_null
      - name: customer_tenure_days
        description: Number of days between signup and order date.
        tests:
          - not_null
  - name: int_customer_lifetime
    description: Customer-level lifetime and engagement aggregates.
    columns:
      - name: customer_id
        description: Unique customer identifier.
        tests:
          - not_null
          - unique
      - name: lifetime_revenue
        description: Total revenue generated by the customer.
        tests:
          - not_null
      - name: total_orders
        description: Total number of orders placed by the customer.
        tests:
          - not_null
      - name: last_order_date
        description: Most recent order date for the customer.
        tests:
          - not_null
